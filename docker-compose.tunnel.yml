version: '3.8'

# Simplified docker-compose for Cloudflare Tunnels
# - No Nginx needed (Cloudflare is the reverse proxy)
# - No SSL cert management (Cloudflare handles SSL)
# - App only exposed to localhost:3000

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: giac-book-indexer
    
    # Only expose to localhost, NOT to internet
    ports:
      - "localhost:3000:3000"
    
    environment:
      - NODE_ENV=production
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}
      - VITE_ROLLBAR_ACCESS_TOKEN=${VITE_ROLLBAR_ACCESS_TOKEN:-}
      - VITE_APP_ENV=production
      - VITE_APP_VERSION=${VITE_APP_VERSION:-1.0.0}
    
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
